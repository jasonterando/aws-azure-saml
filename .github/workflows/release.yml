name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Run tests on all commits to main and PRs
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --verbose

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Check formatting
        run: cargo fmt -- --check

  # Build for Linux x86_64
  build-linux-x86_64:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: |
          cargo build --release --target x86_64-unknown-linux-gnu
          strip target/x86_64-unknown-linux-gnu/release/aws-azure-saml
          mkdir -p artifacts/linux-x86_64
          cp target/x86_64-unknown-linux-gnu/release/aws-azure-saml artifacts/linux-x86_64/
          chmod +x artifacts/linux-x86_64/aws-azure-saml

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: artifacts/linux-x86_64/
          retention-days: 7

  # Build for Linux ARM64
  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary with cross
        env:
          OPENSSL_VENDORED: 1
        run: |
          cross build --release --target aarch64-unknown-linux-gnu
          mkdir -p artifacts/linux-arm64
          cp target/aarch64-unknown-linux-gnu/release/aws-azure-saml artifacts/linux-arm64/
          chmod +x artifacts/linux-arm64/aws-azure-saml

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-arm64
          path: artifacts/linux-arm64/
          retention-days: 7

  # Build for Windows x86_64
  build-windows-x86_64:
    name: Build Windows x86_64
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-windows-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: |
          cargo build --release --target x86_64-pc-windows-gnu
          mkdir -p artifacts/windows-x86_64
          cp target/x86_64-pc-windows-gnu/release/aws-azure-saml.exe artifacts/windows-x86_64/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x86_64
          path: artifacts/windows-x86_64/
          retention-days: 7

  # Build for macOS x86_64 (Intel) - cross-compiled from Apple Silicon
  build-macos-x86_64:
    name: Build macOS x86_64
    runs-on: macos-14  # Apple Silicon runner, cross-compile to x86_64
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-x86_64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: |
          cargo build --release --target x86_64-apple-darwin
          strip target/x86_64-apple-darwin/release/aws-azure-saml
          mkdir -p artifacts/macos-x86_64
          cp target/x86_64-apple-darwin/release/aws-azure-saml artifacts/macos-x86_64/
          chmod +x artifacts/macos-x86_64/aws-azure-saml

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-x86_64
          path: artifacts/macos-x86_64/
          retention-days: 7

  # Build for macOS ARM64 (Apple Silicon)
  build-macos-arm64:
    name: Build macOS ARM64
    runs-on: macos-14  # Apple Silicon runner
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-aarch64-${{ hashFiles('**/Cargo.lock') }}

      - name: Build binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          strip target/aarch64-apple-darwin/release/aws-azure-saml
          mkdir -p artifacts/macos-arm64
          cp target/aarch64-apple-darwin/release/aws-azure-saml artifacts/macos-arm64/
          chmod +x artifacts/macos-arm64/aws-azure-saml

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64
          path: artifacts/macos-arm64/
          retention-days: 7

  # Create GitHub Release with all artifacts
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-windows-x86_64
      - build-macos-x86_64
      - build-macos-arm64
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Display artifact structure
        run: ls -R artifacts/

      - name: Set executable permissions on binaries
        run: |
          chmod +x artifacts/linux-x86_64/aws-azure-saml
          chmod +x artifacts/linux-arm64/aws-azure-saml
          chmod +x artifacts/macos-x86_64/aws-azure-saml
          chmod +x artifacts/macos-arm64/aws-azure-saml

      - name: Create ZIP archives
        run: |
          cd artifacts
          for dir in */; do
            platform="${dir%/}"
            cd "$platform"
            zip -r "../aws-azure-saml-${platform}.zip" .
            cd ..
          done
          ls -lh *.zip

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## aws-azure-saml ${{ github.ref_name }}

            AWS CLI authentication using Azure Active Directory SAML SSO.

            ### Installation

            Download the ZIP file for your platform, extract it, and install:

            **Linux/macOS:**
            ```bash
            # Download and extract (example for Linux x86_64)
            unzip aws-azure-saml-linux-x86_64.zip
            sudo mv aws-azure-saml /usr/local/bin/
            ```

            **Windows:**
            ```powershell
            # Extract ZIP file
            Expand-Archive aws-azure-saml-windows-x86_64.zip
            # Move aws-azure-saml.exe to a directory in your PATH
            ```

            ### Verification

            Verify the download with SHA256 checksums:
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### Usage

            ```bash
            # Configure a profile
            aws-azure-saml --configure --profile my-profile

            # Login
            aws-azure-saml --profile my-profile
            ```

            See the [README](https://github.com/${{ github.repository }}/blob/main/README.md) for full documentation.
          files: |
            artifacts/aws-azure-saml-linux-x86_64.zip
            artifacts/aws-azure-saml-linux-arm64.zip
            artifacts/aws-azure-saml-windows-x86_64.zip
            artifacts/aws-azure-saml-macos-x86_64.zip
            artifacts/aws-azure-saml-macos-arm64.zip
            artifacts/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
