stages:
  - test
  - build
  - release

variables:
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  RUST_BACKTRACE: "1"

# Cache Rust dependencies
.cache_template: &cache_definition
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - .cargo/
      - target/

# Test stage - runs on all commits and tags
test:
  stage: test
  image: rust:1.75
  <<: *cache_definition
  script:
    - rustc --version
    - cargo --version
    - cargo test --verbose
    - cargo clippy -- -D warnings
    - cargo fmt -- --check
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'

# Build for Linux x86_64
build:linux-x86_64:
  stage: build
  image: rust:1.75
  <<: *cache_definition
  script:
    - rustc --version
    - cargo --version
    - cargo build --release --target x86_64-unknown-linux-gnu
    - strip target/x86_64-unknown-linux-gnu/release/aws-azure-saml
    - mkdir -p artifacts
    - cp target/x86_64-unknown-linux-gnu/release/aws-azure-saml artifacts/aws-azure-saml-linux-x86_64
    - chmod +x artifacts/aws-azure-saml-linux-x86_64
  artifacts:
    name: "aws-azure-saml-$CI_COMMIT_TAG-linux-x86_64"
    paths:
      - artifacts/aws-azure-saml-linux-x86_64
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG'

# Build for Linux ARM64
build:linux-arm64:
  stage: build
  image: rust:1.75
  <<: *cache_definition
  before_script:
    - apt-get update
    - apt-get install -y gcc-aarch64-linux-gnu
    - rustup target add aarch64-unknown-linux-gnu
  script:
    - cargo build --release --target aarch64-unknown-linux-gnu
    - aarch64-linux-gnu-strip target/aarch64-unknown-linux-gnu/release/aws-azure-saml || true
    - mkdir -p artifacts
    - cp target/aarch64-unknown-linux-gnu/release/aws-azure-saml artifacts/aws-azure-saml-linux-arm64
    - chmod +x artifacts/aws-azure-saml-linux-arm64
  artifacts:
    name: "aws-azure-saml-$CI_COMMIT_TAG-linux-arm64"
    paths:
      - artifacts/aws-azure-saml-linux-arm64
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG'

# Build for Windows x86_64 (using cross-compilation)
build:windows-x86_64:
  stage: build
  image: rust:1.75
  <<: *cache_definition
  before_script:
    - apt-get update
    - apt-get install -y gcc-mingw-w64-x86-64
    - rustup target add x86_64-pc-windows-gnu
  script:
    - cargo build --release --target x86_64-pc-windows-gnu
    - mkdir -p artifacts
    - cp target/x86_64-pc-windows-gnu/release/aws-azure-saml.exe artifacts/aws-azure-saml-windows-x86_64.exe
  artifacts:
    name: "aws-azure-saml-$CI_COMMIT_TAG-windows-x86_64"
    paths:
      - artifacts/aws-azure-saml-windows-x86_64.exe
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG'

# Build for macOS x86_64 (Intel)
# Note: Requires a macOS runner. If not available, use osxcross or comment out.
build:macos-x86_64:
  stage: build
  tags:
    - macos
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - rustup target add x86_64-apple-darwin
  script:
    - cargo build --release --target x86_64-apple-darwin
    - strip target/x86_64-apple-darwin/release/aws-azure-saml
    - mkdir -p artifacts
    - cp target/x86_64-apple-darwin/release/aws-azure-saml artifacts/aws-azure-saml-macos-x86_64
    - chmod +x artifacts/aws-azure-saml-macos-x86_64
  artifacts:
    name: "aws-azure-saml-$CI_COMMIT_TAG-macos-x86_64"
    paths:
      - artifacts/aws-azure-saml-macos-x86_64
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG'
  allow_failure: true  # Allow failure if macOS runner not available

# Build for macOS ARM64 (Apple Silicon)
# Note: Requires a macOS ARM64 runner. If not available, comment out.
build:macos-arm64:
  stage: build
  tags:
    - macos
    - arm64
  variables:
    CARGO_HOME: $CI_PROJECT_DIR/.cargo
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - source $HOME/.cargo/env
    - rustup target add aarch64-apple-darwin
  script:
    - cargo build --release --target aarch64-apple-darwin
    - strip target/aarch64-apple-darwin/release/aws-azure-saml
    - mkdir -p artifacts
    - cp target/aarch64-apple-darwin/release/aws-azure-saml artifacts/aws-azure-saml-macos-arm64
    - chmod +x artifacts/aws-azure-saml-macos-arm64
  artifacts:
    name: "aws-azure-saml-$CI_COMMIT_TAG-macos-arm64"
    paths:
      - artifacts/aws-azure-saml-macos-arm64
    expire_in: 1 week
  rules:
    - if: '$CI_COMMIT_TAG'
  allow_failure: true  # Allow failure if macOS ARM64 runner not available

# Create GitLab release with all artifacts
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build:linux-x86_64
    - build:linux-arm64
    - build:windows-x86_64
    - build:macos-x86_64
    - build:macos-arm64
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Release $CI_COMMIT_TAG'
    description: |
      ## aws-azure-saml $CI_COMMIT_TAG

      AWS CLI authentication using Azure Active Directory SAML SSO.

      ### Installation

      Download the appropriate binary for your platform:
      - **Linux x86_64**: `aws-azure-saml-linux-x86_64`
      - **Linux ARM64**: `aws-azure-saml-linux-arm64`
      - **Windows x86_64**: `aws-azure-saml-windows-x86_64.exe`
      - **macOS Intel**: `aws-azure-saml-macos-x86_64`
      - **macOS Apple Silicon**: `aws-azure-saml-macos-arm64`

      Make the binary executable (Linux/macOS):
      ```bash
      chmod +x aws-azure-saml-*
      sudo mv aws-azure-saml-* /usr/local/bin/aws-azure-saml
      ```

      ### Usage

      ```bash
      # Configure a profile
      aws-azure-saml --configure --profile my-profile

      # Login
      aws-azure-saml --profile my-profile
      ```

      See the [README](README.md) for full documentation.
    assets:
      links:
        - name: 'Linux x86_64'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/aws-azure-saml-linux-x86_64?job=build:linux-x86_64'
          link_type: 'package'
        - name: 'Linux ARM64'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/aws-azure-saml-linux-arm64?job=build:linux-arm64'
          link_type: 'package'
        - name: 'Windows x86_64'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/aws-azure-saml-windows-x86_64.exe?job=build:windows-x86_64'
          link_type: 'package'
        - name: 'macOS Intel (x86_64)'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/aws-azure-saml-macos-x86_64?job=build:macos-x86_64'
          link_type: 'package'
        - name: 'macOS Apple Silicon (ARM64)'
          url: '${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/artifacts/aws-azure-saml-macos-arm64?job=build:macos-arm64'
          link_type: 'package'
  rules:
    - if: '$CI_COMMIT_TAG'
